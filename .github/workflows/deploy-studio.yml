name: Deploy Sanity Studio

on:
  push:
    branches: [main]
    paths:
      - 'sanity.config.ts'
      - 'schemaTypes/**'
      - 'schemas/**'
  workflow_dispatch:

jobs:
  deploy-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Sanity Studio
        run: npx sanity deploy --yes
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
